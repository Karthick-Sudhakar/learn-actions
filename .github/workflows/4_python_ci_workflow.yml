name: Python CI Wowrkflow
on: 
    workflow_dispatch:

jobs:
  py_ci_job:  # Job identifier #
    runs-on: ubuntu-latest
    steps:
        
        # First step is to checkout the code using builtin actions
        - name: Code Checkout
          uses: actions/checkout@v4
          with:
            clean: True

        # Second step is to setup the python environment to build the package
        - name: Setup python environment
          uses: actions/setup-python@v4
          with:
            python-version: "3.14"

        # Build tool is required to build the packages
        - name: Install py build tool
          run: |
            python -m pip install build

        - name: Debug paths
          run: |
            echo "Workspace: ${{ github.workspace }}"
            ls -R ${{ github.workspace }}
            echo "Project1:"
            ls -R ${{ github.workspace }}/python/project1

        # Initiate build
        - name: PY Build
          working-directory: ${{ github.workspace }}/python/project1/
          run: |
            python -m build
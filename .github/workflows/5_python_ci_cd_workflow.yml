name: Python CI & CD Workflow
on:
    workflow_dispatch:

jobs:
  py_ci_job:  #Job 1 #
    runs-on: ubuntu-latest
    steps:
        
        # First step is to checkout the code using builtin actions
        - name: Code Checkout
          uses: actions/checkout@v4
          with:
            clean: True

        # Second step is to setup the python environment to build the package
        - name: Setup python environment
          uses: actions/setup-python@v4
          with:
            python-version: "3.14"

        # Build tool is required to build the packages
        - name: Install py build tool
          run: |
            python -m pip install build

        # Initiate build
        - name: PY Build
          working-directory: ${{ github.workspace }}/python/project1/
          run: |
            python -m build

        - name: Upload wheel artifact
          uses: actions/upload-artifact@v4
          with:
            name: py-build-wheel
            path: ${{ github.workspace }}/python/project1/dist/*.whl

  py_cd_job:  #Job 1 #
    runs-on: ubuntu-latest
    needs: py_ci_job   # ensures build finishes first
    steps:

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: py-build-wheel
          path: wheel/

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install wheel
        run: |
          pip install wheel/*.whl

      - name: Run tests against installed package
        run: |
          pip install pytest
          pytest -q

